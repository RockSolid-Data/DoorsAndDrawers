{% extends 'base.html' %}

{% block content %}
<div class="flex justify-between items-center mb-3">
    <h1 class="text-xl font-bold text-gray-800">Customers</h1>
    <a href="{% url 'new_customer' %}" class="inline-flex items-center px-3 py-1.5 text-sm font-medium rounded bg-indigo-600 hover:bg-indigo-700 text-white shadow-sm">
        <svg class="h-4 w-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        Add Customer
    </a>
</div>

<div class="mb-3">
    <div class="relative">
        <input 
            type="text" 
            name="search" 
            placeholder="Search customers..." 
            class="pl-9 pr-4 py-1.5 w-full text-sm"
            hx-get="{% url 'customer_search' %}"
            hx-trigger="keyup changed delay:300ms, search"
            hx-target="#customer-results"
            hx-swap="innerHTML"
            hx-indicator="#search-indicator"
            value="{{ search_query }}"
        />
        <div class="absolute inset-y-0 left-0 flex items-center pl-2.5 pointer-events-none">
            <svg class="w-4 h-4 text-gray-400" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"></path>
            </svg>
        </div>
        <div id="search-indicator" class="htmx-indicator absolute right-3 inset-y-0 flex items-center">
            <svg class="animate-spin h-4 w-4 text-indigo-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
        </div>
    </div>
</div>

<div class="bg-white border border-gray-200 rounded-lg overflow-hidden">
    <table class="w-full text-sm">
        <thead>
            <tr class="text-left text-xs font-semibold text-gray-500 uppercase tracking-wider bg-gray-50 border-b border-gray-200">
                <th class="px-4 py-2">Company</th>
                <th class="px-4 py-2">Contact</th>
                <th class="px-4 py-2">Phone</th>
                <th class="px-4 py-2">Location</th>
                <th class="px-4 py-2 text-right">Actions</th>
            </tr>
        </thead>
        <tbody id="customer-results" class="divide-y divide-gray-100">
            {% include 'customer/partials/customer_results.html' with customers=customers search_query=search_query paginator=customers.paginator %}
        </tbody>
    </table>
</div>
{% endblock %}
