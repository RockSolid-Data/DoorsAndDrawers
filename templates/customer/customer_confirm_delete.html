{% extends 'base.html' %}

{% block content %}
<div class="max-w-lg mx-auto mt-8">
    <div class="bg-white border border-gray-200 rounded-lg p-5">
        <div class="flex items-start gap-3">
            <div class="flex-shrink-0 flex items-center justify-center h-9 w-9 rounded-full bg-red-100">
                <svg class="h-5 w-5 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
            </div>
            <div>
                <h3 class="text-base font-semibold text-gray-900">Delete Customer</h3>
                <p class="mt-1 text-sm text-gray-500">
                    Are you sure you want to delete customer {{ customer.company_name|default:"this customer" }}? This action cannot be undone.
                </p>
            </div>
        </div>
        <div class="mt-4 flex justify-end gap-2">
            <a href="{% url 'customer_detail' customer.id %}" class="px-3 py-1.5 text-sm font-medium rounded border border-gray-300 text-gray-700 bg-white hover:bg-gray-50">
                Cancel
            </a>
            <form method="post" class="inline">
                {% csrf_token %}
                <button type="submit" class="px-3 py-1.5 text-sm font-medium rounded text-white bg-red-600 hover:bg-red-700">
                    Delete
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
