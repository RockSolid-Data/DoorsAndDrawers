<div id="modal-backdrop"
     class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/50 backdrop-blur-sm"
     onclick="if(event.target===this)closeModal()">
    <div class="bg-white rounded-xl shadow-2xl max-w-sm w-full mx-4 overflow-hidden">
        <div class="px-5 py-4">
            <div class="flex items-start gap-3">
                <div class="flex-shrink-0 flex items-center justify-center h-10 w-10 rounded-full bg-green-100">
                    <svg class="h-5 w-5 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                    </svg>
                </div>
                <div>
                    <h3 class="text-base font-semibold text-gray-900">Convert Quote to Order</h3>
                    <p class="mt-1 text-sm text-gray-500">
                        Are you sure you want to convert quote {{ order.order_number }} to an order? This action cannot be undone.
                    </p>
                </div>
            </div>
        </div>
        <div class="px-5 py-3 bg-gray-50 flex justify-end gap-2">
            <button type="button" onclick="closeModal()"
                    class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium rounded-lg border border-gray-300 text-gray-700 bg-white hover:bg-gray-50 transition-colors">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                Cancel
            </button>
            <form hx-post="{% url 'convert_to_order' order.id %}" hx-target="#modal">
                {% csrf_token %}
                <button type="submit"
                        class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium rounded-lg text-white bg-green-600 hover:bg-green-700 transition-colors">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>
                    Convert to Order
                </button>
            </form>
        </div>
    </div>
</div>
