{% extends 'base.html' %}

{% block content %}
<h1 class="text-2xl font-semibold text-gray-900 mb-6">Settings</h1>

<div class="grid grid-cols-1 sm:grid-cols-2 gap-4 max-w-lg">
    <a href="{% url 'door_settings' %}" class="group bg-white rounded-xl p-6 shadow-sm border border-gray-100 hover:border-indigo-200 hover:shadow-md transition-all">
        <svg class="w-8 h-8 mb-3 text-indigo-500 group-hover:text-indigo-600 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <rect x="3" y="2" width="18" height="20" rx="2" stroke-width="1.5"/>
            <path stroke-linecap="round" stroke-width="1.5" d="M12 2v20"/>
            <circle cx="15.5" cy="12" r="1" fill="currentColor" stroke="none"/>
            <circle cx="8.5" cy="12" r="1" fill="currentColor" stroke="none"/>
        </svg>
        <h2 class="text-sm font-semibold text-gray-900">Door Settings</h2>
        <p class="text-xs text-gray-500 mt-1">Styles, wood, designs & more</p>
    </a>
    
    <a href="{% url 'drawer_settings' %}" class="group bg-white rounded-xl p-6 shadow-sm border border-gray-100 hover:border-indigo-200 hover:shadow-md transition-all">
        <svg class="w-8 h-8 mb-3 text-indigo-500 group-hover:text-indigo-600 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <rect x="2" y="2" width="20" height="10" rx="2" stroke-width="1.5"/>
            <rect x="2" y="12" width="20" height="10" rx="2" stroke-width="1.5"/>
            <path stroke-linecap="round" stroke-width="1.5" d="M9 7h6M9 17h6"/>
        </svg>
        <h2 class="text-sm font-semibold text-gray-900">Drawer Settings</h2>
        <p class="text-xs text-gray-500 mt-1">Pricing, sizes & defaults</p>
    </a>
</div>

<div class="mt-32 text-xs text-gray-400">
    Version 1.3
</div>
{% endblock %}
