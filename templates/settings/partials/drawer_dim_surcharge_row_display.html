<tr id="drawer-dim-surcharge-row-{{ surcharge.id }}" class="hover:bg-gray-50 transition-colors">
    <td class="px-5 py-3 whitespace-nowrap text-sm font-medium text-gray-900">{{ surcharge.width|floatformat:2 }}"</td>
    <td class="px-5 py-3 whitespace-nowrap text-sm text-gray-600">{{ surcharge.depth|floatformat:2 }}"</td>
    <td class="px-5 py-3 whitespace-nowrap text-sm text-gray-600">{{ surcharge.surcharge_percent|floatformat:2 }}%</td>
    <td class="px-5 py-3 whitespace-nowrap text-sm text-right">
        <button class="p-1 rounded text-gray-400 hover:text-indigo-600 hover:bg-indigo-50 transition-colors"
                hx-get="{% url 'edit_drawer_dim_surcharge' surcharge.id %}" hx-target="#modal" title="Edit">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
        </button>
        <button class="p-1 rounded text-gray-400 hover:text-red-600 hover:bg-red-50 transition-colors"
                hx-get="{% url 'confirm_delete_drawer_dim_surcharge' surcharge.id %}" hx-target="#modal" title="Delete">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
        </button>
    </td>
</tr>
