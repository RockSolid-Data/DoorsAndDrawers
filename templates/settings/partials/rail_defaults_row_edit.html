<div id="modal-backdrop"
     class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/50 backdrop-blur-sm"
     onclick="if(event.target===this)closeModal()">
    <div class="bg-white rounded-xl shadow-2xl max-w-md w-full mx-4 overflow-hidden">
        <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100">
            <h3 class="text-base font-semibold text-gray-900">Edit Rail Defaults</h3>
            <button type="button" onclick="closeModal()"
                    class="text-gray-400 hover:text-gray-600 transition-colors rounded-lg p-1 hover:bg-gray-100">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <form hx-post="{% url 'update_rail_defaults' %}" hx-target="#modal">
            {% csrf_token %}
            <div class="px-5 py-5 space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="id_top" class="block text-sm text-gray-600 mb-1">Top</label>
                        <input type="number" name="top" id="id_top" step="0.001" min="0.001" value="{{ defaults.top }}"
                               class="w-full text-sm px-3 py-2 rounded-lg">
                    </div>
                    <div>
                        <label for="id_bottom" class="block text-sm text-gray-600 mb-1">Bottom</label>
                        <input type="number" name="bottom" id="id_bottom" step="0.001" min="0.001" value="{{ defaults.bottom }}"
                               class="w-full text-sm px-3 py-2 rounded-lg">
                    </div>
                    <div>
                        <label for="id_left" class="block text-sm text-gray-600 mb-1">Left</label>
                        <input type="number" name="left" id="id_left" step="0.001" min="0.001" value="{{ defaults.left }}"
                               class="w-full text-sm px-3 py-2 rounded-lg">
                    </div>
                    <div>
                        <label for="id_right" class="block text-sm text-gray-600 mb-1">Right</label>
                        <input type="number" name="right" id="id_right" step="0.001" min="0.001" value="{{ defaults.right }}"
                               class="w-full text-sm px-3 py-2 rounded-lg">
                    </div>
                </div>
                <div>
                    <label for="id_interior_rail_size" class="block text-sm text-gray-600 mb-1">Interior</label>
                    <input type="number" name="interior_rail_size" id="id_interior_rail_size" step="0.001" min="0.001" value="{{ defaults.interior_rail_size }}"
                           class="w-full text-sm px-3 py-2 rounded-lg">
                </div>
            </div>
            <div class="px-5 py-3 bg-gray-50 border-t border-gray-100 flex justify-end gap-2">
                <button type="button" onclick="closeModal()"
                        class="inline-flex items-center gap-1.5 px-4 py-2 text-sm font-medium rounded-lg border border-gray-300 text-gray-700 bg-white hover:bg-gray-50 transition-colors">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    Cancel
                </button>
                <button type="submit"
                        class="inline-flex items-center gap-1.5 px-4 py-2 text-sm font-medium rounded-lg text-white bg-indigo-600 hover:bg-indigo-700 transition-colors">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                    Save
                </button>
            </div>
        </form>
    </div>
</div>
