<div id="rail-defaults-fields">
    <dl class="grid grid-cols-2 md:grid-cols-3 gap-x-6 gap-y-4">
        <div>
            <dt class="text-xs text-gray-500 mb-1">Top Rail</dt>
            <dd class="text-sm font-medium text-gray-900">{{ defaults.top }}"</dd>
        </div>
        <div>
            <dt class="text-xs text-gray-500 mb-1">Bottom Rail</dt>
            <dd class="text-sm font-medium text-gray-900">{{ defaults.bottom }}"</dd>
        </div>
        <div>
            <dt class="text-xs text-gray-500 mb-1">Left Rail</dt>
            <dd class="text-sm font-medium text-gray-900">{{ defaults.left }}"</dd>
        </div>
        <div>
            <dt class="text-xs text-gray-500 mb-1">Right Rail</dt>
            <dd class="text-sm font-medium text-gray-900">{{ defaults.right }}"</dd>
        </div>
        <div>
            <dt class="text-xs text-gray-500 mb-1">Interior Rail</dt>
            <dd class="text-sm font-medium text-gray-900">{{ defaults.interior_rail_size }}"</dd>
        </div>
    </dl>
    <div class="mt-5 flex justify-end">
        <button hx-get="{% url 'edit_rail_defaults' %}" hx-target="#modal"
                class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-gray-600 hover:text-indigo-600 rounded-lg hover:bg-indigo-50 transition-colors">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
            </svg>
            Edit
        </button>
    </div>
</div>
