<div id="modal-backdrop"
     class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/50 backdrop-blur-sm"
     onclick="if(event.target===this)closeModal()">
    <div class="bg-white rounded-xl shadow-2xl max-w-lg w-full mx-4 overflow-hidden">
        <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100">
            <h3 class="text-base font-semibold text-gray-900">Edit Drawer Defaults</h3>
            <button type="button" onclick="closeModal()"
                    class="text-gray-400 hover:text-gray-600 transition-colors rounded-lg p-1 hover:bg-gray-100">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <form hx-post="{% url 'update_drawer_defaults' %}" hx-target="#modal">
            {% csrf_token %}
            <div class="px-5 py-5 space-y-5">
                <div>
                    <h4 class="text-xs font-medium text-gray-500 uppercase tracking-wider mb-3">Surcharges</h4>
                    <div class="grid grid-cols-3 gap-3">
                        <div>
                            <label for="id_surcharge_width" class="block text-sm text-gray-600 mb-1">Width</label>
                            <input type="number" name="surcharge_width" id="id_surcharge_width" step="0.01" min="0" value="{{ defaults.surcharge_width }}"
                                   class="w-full text-sm px-3 py-2 rounded-lg">
                        </div>
                        <div>
                            <label for="id_surcharge_depth" class="block text-sm text-gray-600 mb-1">Depth</label>
                            <input type="number" name="surcharge_depth" id="id_surcharge_depth" step="0.01" min="0" value="{{ defaults.surcharge_depth }}"
                                   class="w-full text-sm px-3 py-2 rounded-lg">
                        </div>
                        <div>
                            <label for="id_surcharge_percent" class="block text-sm text-gray-600 mb-1">Percent</label>
                            <input type="number" name="surcharge_percent" id="id_surcharge_percent" step="0.01" min="0" value="{{ defaults.surcharge_percent }}"
                                   class="w-full text-sm px-3 py-2 rounded-lg">
                        </div>
                    </div>
                </div>

                <div>
                    <h4 class="text-xs font-medium text-gray-500 uppercase tracking-wider mb-3">Charges</h4>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label for="id_finish_charge" class="block text-sm text-gray-600 mb-1">Finish Charge</label>
                            <input type="number" name="finish_charge" id="id_finish_charge" step="0.01" min="0" value="{{ defaults.finish_charge }}"
                                   class="w-full text-sm px-3 py-2 rounded-lg">
                        </div>
                        <div>
                            <label for="id_undermount_charge" class="block text-sm text-gray-600 mb-1">Undermount Charge</label>
                            <input type="number" name="undermount_charge" id="id_undermount_charge" step="0.01" min="0" value="{{ defaults.undermount_charge }}"
                                   class="w-full text-sm px-3 py-2 rounded-lg">
                        </div>
                    </div>
                </div>

                <div>
                    <h4 class="text-xs font-medium text-gray-500 uppercase tracking-wider mb-3">Cutting Adjustments</h4>
                    <div class="grid grid-cols-3 gap-3">
                        <div>
                            <label for="id_ends_cutting_adjustment" class="block text-sm text-gray-600 mb-1">Ends</label>
                            <input type="number" name="ends_cutting_adjustment" id="id_ends_cutting_adjustment" step="0.001" min="0" value="{{ defaults.ends_cutting_adjustment }}"
                                   class="w-full text-sm px-3 py-2 rounded-lg">
                        </div>
                        <div>
                            <label for="id_sides_cutting_adjustment" class="block text-sm text-gray-600 mb-1">Sides</label>
                            <input type="number" name="sides_cutting_adjustment" id="id_sides_cutting_adjustment" step="0.001" min="0" value="{{ defaults.sides_cutting_adjustment }}"
                                   class="w-full text-sm px-3 py-2 rounded-lg">
                        </div>
                        <div>
                            <label for="id_plywood_size_adjustment" class="block text-sm text-gray-600 mb-1">Plywood</label>
                            <input type="number" name="plywood_size_adjustment" id="id_plywood_size_adjustment" step="0.001" min="0" value="{{ defaults.plywood_size_adjustment }}"
                                   class="w-full text-sm px-3 py-2 rounded-lg">
                        </div>
                    </div>
                </div>
            </div>
            <div class="px-5 py-3 bg-gray-50 border-t border-gray-100 flex justify-end gap-2">
                <button type="button" onclick="closeModal()"
                        class="inline-flex items-center gap-1.5 px-4 py-2 text-sm font-medium rounded-lg border border-gray-300 text-gray-700 bg-white hover:bg-gray-50 transition-colors">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    Cancel
                </button>
                <button type="submit"
                        class="inline-flex items-center gap-1.5 px-4 py-2 text-sm font-medium rounded-lg text-white bg-indigo-600 hover:bg-indigo-700 transition-colors">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                    Save
                </button>
            </div>
        </form>
    </div>
</div>
