{% extends 'base.html' %}

{% block content %}
<div class="max-w-lg mx-auto mt-8">
    <div class="bg-white border border-gray-200 rounded-lg p-5">
        <div class="flex items-start gap-3">
            <div class="flex-shrink-0 flex items-center justify-center h-9 w-9 rounded-full bg-green-100">
                <svg class="h-5 w-5 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                </svg>
            </div>
            <div>
                <h3 class="text-base font-semibold text-gray-900">Convert Quote to Order</h3>
                <p class="mt-1 text-sm text-gray-500">
                    Are you sure you want to convert quote {{ quote.order_number }} to an order? This action cannot be undone.
                </p>
            </div>
        </div>
        <div class="mt-4 flex justify-end gap-2">
            <a href="{% url 'quote_detail' quote.id %}" class="px-3 py-1.5 text-sm font-medium rounded border border-gray-300 text-gray-700 bg-white hover:bg-gray-50">
                Cancel
            </a>
            <form method="post" class="inline">
                {% csrf_token %}
                <button type="submit" class="px-3 py-1.5 text-sm font-medium rounded text-white bg-green-600 hover:bg-green-700">
                    Convert to Order
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
